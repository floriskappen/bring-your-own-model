name: Validate registry

on:
  pull_request:
    paths:
      - 'constitution/registry/registry.yaml'
      - 'constitution/registry/registry.schema.json'
      - 'constitution/registry/validate_registry.py'
      - '.github/workflows/validate-registry.yml'
  push:
    branches: [main]
    paths:
      - 'constitution/registry/registry.yaml'
      - 'constitution/registry/registry.schema.json'
      - 'constitution/registry/validate_registry.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install validator deps
        run: pip install pyyaml jsonschema
      - name: Validate registry.yaml against schema
        run: python3 constitution/registry/validate_registry.py
