schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Project: bring-your-own-model (BYOM)
  Repo role: this repo IS the BYOM website — the whole thing. It hosts the constitution
  (philosophy, provider model, security best-practices, the UX contract for the connect wizard),
  the BYOM badge, and the registry of participating apps.
  Stack: TBD — a website / docs site (likely static). Open-source.
  Conventions: conventional commits

  What BYOM is: a pattern, a spec, and a small free-software movement for apps whose core is built
  around LLM/agent functionality. The app is given away free; the parts that need online inference
  don't run on the developer's dime — the user brings their own model access (a provider API key, an
  OpenRouter key, or similar) and pays only for the inference they personally consume. No middleman,
  no markup, no payment plumbing to maintain, and the app stays genuinely free.

  The deeper framing: a philosophy of free software for the LLM era. The app is the scaffold and
  interface; the model is what animates it. BYOM features are optional-but-powered-by-your-own-model —
  the rest of the app works without it, but the smart features need a connected model.

  Architecture decision: NOT a shared backend service, and NOT blind per-app reimplementation, but a
  written constitution plus thin per-ecosystem libraries. The load-bearing change: the key never
  touches the developer's infrastructure — it lives in the user's browser (in-memory by default,
  optionally persisted for next visit) and calls the provider/OpenRouter directly. That dissolves the
  need for a centralized crypto/key service, because there's no server-side key handling to
  centralize. A thin shared lib is fine WITHIN one language (npm for web, pub for Flutter); don't try
  to share across Dart and JS.

  What the constitution standardizes: the connect-wizard UX, browser storage rules, the fetch
  wrapper, token tracking, and the security invariants — in-memory default, strict CSP, minimal
  third-party JS, never log the key. Apps that follow it display a BYOM badge linking back to the
  site; the site lists participating apps in a registry (Bedrijfskompas and AI-laser to begin with).

  Trust position (be honest about it): in-page UI can always be cloned, so a recognizable badge does
  not guarantee safety. Real phishing resistance would need privileged browser chrome (a MetaMask-style
  extension), which is out of scope for now. The current honest position is browser-local keys + a
  clear security page + the constitution's invariants — a privacy/UX win, not an absolute security
  guarantee.

  Monetization: deliberately OSS-first, no monetization assumed. Worth building at N=1 because it makes
  multi-app life easier and encodes the security rules once. External adopters or a future paid layer
  (dev-side B2B, enterprise budget management) are upside, not something to design for yet.

  Brand note: avoid the robot icon (reads as "agent" — wrong meaning) and the key-as-chore framing;
  prefer a model / socket / connect glyph.

  First apps needing this: Bedrijfskompas (company map + agentic CV matching) and AI-laser (e-reader).

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - State which surface this change affects — constitution content, the badge spec, the registry, the connect-wizard UX contract, or the security invariants — and why.
    - If a change touches the security invariants or the key's trust boundary, flag it explicitly; that's the highest-stakes surface.
    - Ideal length is ~15-50 lines. The shorter the better.
  specs:
    - The security invariants are normative, not aspirational — spec them as hard requirements with observable behaviour. Key in-memory by default, opt-in persistence, strict CSP, minimal third-party JS, key never logged, key never sent to first-party infrastructure (calls go directly to the provider/OpenRouter).
    - For the badge and registry, define the artifacts explicitly — the badge's link/markup contract, and the registry entry schema (what an app must declare to be listed, what's required vs optional). Treat the registry schema and the badge contract as external interfaces other apps depend on.
    - For the connect-wizard UX contract, describe what the user sees and does (provider/OpenRouter choice, key entry, in-memory vs persist decision, token/usage feedback) and what the wizard must never do — describe behaviour, not framework or component structure.
    - Be honest about boundaries in the spec — state what BYOM does NOT guarantee (no phishing resistance from in-page UI alone; no protection against a malicious host app). Edge cases the spec must address include persisted-key handling across visits, key revocation/clearing, provider errors, and rate/budget limits.
    - Write specs timelessly — describe the current state, not the change. MODIFIED requirements replace the canonical spec verbatim on archive, so avoid "subsumes/replaces/was formerly/remains/no longer" framing in requirement bodies and scenarios. History belongs in the proposal and git log, not the spec.
    - Keep requirement bodies to one short paragraph. If a requirement needs more, it's probably two requirements, or you're explaining *why* — and rationale belongs in design.md.
    - One scenario per distinct observable behaviour. If two scenarios share their WHEN clause, merge them. Don't write a scenario whose only purpose is to restate a requirement bullet.
    - Length is a signal. Above 400 lines is almost always accidental bloat (prose to delete, scenarios to merge, rationale to move to design.md). Per OpenSpec defaults, most specs stay in Lite mode; Full-mode size is only earned when ambiguity would cost real rework.
    - Name load-bearing constants and vocabularies (registry fields, badge variants, supported provider types, CSP directives) but don't justify them inline — the values belong in the spec; the rationale belongs in design.md.
  design:
    - Keep design.md focused on rationale and trade-offs, not load-bearing data. If a list, constant, or schema is required for correct behaviour, move it into specs/.
    - The recurring design axis is the trust boundary — where does the key live, who can see it, and what is honestly promised vs. not. Decisions that move that boundary need explicit justification.
    - Each architectural decision is maybe 5-10 lines -- what was chosen, what alternatives were considered (e.g. shared backend vs. constitution+libs, centralized crypto service vs. browser-local keys), why this one.
    - Ideal length is ~40-80 lines.
  tasks:
    - Treat tests as a first-class deliverable, not an afterthought. Each `#### Scenario:` in the spec should map to at least one named test in the task list; reference the test name explicitly so coverage is auditable.
    - Security invariants deserve explicit, auditable checks (e.g. a test that the key is never written to network logs or first-party endpoints, a CSP-presence check).
